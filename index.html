<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Rafsyah‼️</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:#0f0f1a;
  color:white;
}

.hidden{display:none}

/* CARD FIX */
.card{
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-radius:25px;
  padding:30px 20px 40px;
  width:320px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 0 40px rgba(255,105,180,0.2);
}

/* HEADER FIX */
.journal-title{
  position: sticky;
  top: 0;
  background: rgba(15,15,30,0.95);
  padding:10px;
  border-radius:15px;
  z-index:10;
}

/* SCROLL */
.scroll-3d{
  margin-top:20px;
  padding-bottom:120px;
}

/* IMAGE */
.scroll-item img{
  width:100%;
  display:block;
}

/* BUTTON */
.next-btn{
  position:sticky;
  bottom:15px;
  margin:auto;
  display:block;
  opacity:0;
  transform:translateY(20px);
  transition:.4s;
}
.next-btn.show{
  opacity:1;
  transform:translateY(0);
}

/* CITATION */
.citation{
  font-size:11px;
  opacity:.7;
  margin-top:20px;
  margin-bottom:100px;
  border-top:1px solid rgba(255,255,255,0.1);
  padding-top:10px;
}

/* VIEWER */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.viewer img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div class="card" id="journalScreen">

<h4 class="journal-title">aku nemu ini buat kamu 📄</h4>

<div class="scroll-3d" id="scrollArea">
  <div class="scroll-item"><img src="img/img1.jpg"></div>
  <div class="scroll-item"><img src="img/img2.jpg"></div>
  <div class="scroll-item"><img src="img/img3.jpg"></div>
  <div class="scroll-item"><img src="img/img4.jpg"></div>
  <div class="scroll-item"><img src="img/img5.jpg"></div>
  <div class="scroll-item"><img src="img/img6.jpg"></div>
  <div class="scroll-item"><img src="img/img7.jpg"></div>
  <div class="scroll-item"><img src="img/img8.jpg"></div>
  <div class="scroll-item"><img src="img/img9.jpg"></div>
</div>

<div class="citation">
<b>Daftar Pustaka</b>
<p><em>What lungs look like after quitting smoking</em> - Healthline</p>
<p><em>PENGARUH KEBIASAAN MEROKOK</em></p>
<p><em>The Effects of Smoking on the Body</em></p>
</div>

<button id="nextBtn" class="next-btn hidden">▶️ lanjut</button>

</div>

<!-- VIEWER -->
<div id="imageViewer" class="viewer hidden">
  <img id="viewerImg">
</div>

<script>

// BUTTON FIX
const scrollArea = document.getElementById("scrollArea");
const nextBtn = document.getElementById("nextBtn");

scrollArea.addEventListener("scroll",()=>{
  const visible = scrollArea.scrollTop + scrollArea.clientHeight;
  const total = scrollArea.scrollHeight;

  if(visible >= total - 50){
    nextBtn.classList.add("show");
    nextBtn.classList.remove("hidden");
  }
});

// VIEWER FIX
const viewer = document.getElementById("imageViewer");
const viewerImg = document.getElementById("viewerImg");

document.querySelectorAll(".scroll-item img").forEach(img=>{
  img.onclick = ()=>{
    viewerImg.src = img.src;
    viewer.classList.remove("hidden");
  }
});

viewer.onclick = ()=>{
  viewer.classList.add("hidden");
};

</script>

</body>
</html>
